<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>我的记录</title>
    <link rel="stylesheet" href="sudoku.css">
</head>

<body>
    <!-- ==================== 记录页面容器 ==================== -->
    <!-- 查看题目弹窗 -->
    <div class="modal" id="viewPuzzleModal" style="display: none;">
        <div class="modal-content view-puzzle-content">
            <span class="close" onclick="closeModal('viewPuzzleModal')">&times;</span>
            <h2>📋 题目 #<span id="viewPuzzleId"></span></h2>
            <div class="view-puzzle-tabs">
                <button class="tab-btn active" onclick="switchViewPuzzleTab('puzzle')">题目</button>
                <button class="tab-btn" onclick="switchViewPuzzleTab('solution')">答案</button>
            </div>
            <div class="view-puzzle-board-container">
                <div id="viewPuzzleBoard" class="view-puzzle-board"></div>
            </div>
            <div class="view-puzzle-gameType">
                游戏类型: <span id="viewPuzzleGameType"></span>【<span id="viewPuzzleDifficultyType"></span>】
            </div>
        </div>
    </div>

    <!-- ==================== 记录页面容器 ==================== -->
    <div class="container" id="recordsPage">
        <header class="game-header">
            <div class="header-left">
                <button class="back-btn" onclick="goHome()">‹</button>
                <h1>📊 我的记录</h1>
            </div>
        </header>

        <main class="records-main">
            <!-- 统计摘要 -->
            <div class="stats-summary">
                <div class="stat-card">
                    <div class="stat-number" id="totalGames">0</div>
                    <div class="stat-label">总游戏次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedGames">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalTime">00:00</div>
                    <div class="stat-label">总用时</div>
                </div>
            </div>

            <!-- 记录类型切换标签 -->
            <div class="records-tabs">
                <button class="record-tab-btn active" id="gameRecordTab" onclick="switchRecordType('game')">
                    🎮 游戏记录
                </button>
                <button class="record-tab-btn" id="scoreRecordTab" onclick="switchRecordType('score')">
                    💰 积分记录
                </button>
            </div>

            <!-- 筛选下拉框（游戏记录专用） -->
            <div class="filter-section" id="gameFilterSection">
                <h3>按难度筛选</h3>
                <select class="filter-select" onchange="filterRecords(this.value)">
                    <option value="ALL">全部</option>
                    <option value="MINI_4x4">迷你4宫格</option>
                    <option value="MINI_6x6">迷你6宫格</option>
                    <option value="EASY">简单9宫格</option>
                    <option value="MEDIUM">中等9宫格</option>
                    <option value="HARD">高级9宫格</option>
                    <option value="DIAGONAL">对角线数独</option>
                    <option value="ODD_EVEN">奇偶数独</option>
                    <option value="KILLER_4x4">杀手4宫格</option>
                    <option value="KILLER_6x6">杀手6宫格</option>
                    <option value="KILLER_9x9">杀手9宫格</option>
                    <option value="IRREGULAR">锯齿数独</option>
                    <option value="WINDOKU">窗口数独</option>
                    <option value="CENTER_DOT">中心点数独</option>
                    <option value="STAR">星号数独</option>
                    <option value="BLACK_WHITE_DOT">黑白点数独</option>
                    <option value="SKYSCRAPER">摩天楼数独</option>
                    <option value="SANDWICH">三明治数独</option>
                </select>
            </div>

            <!-- 游戏记录表格 -->
            <div class="records-table-container" id="gameRecordsContainer">
                <table class="records-table" id="recordsTable">
                    <thead>
                        <tr>
                            <th>题目ID</th>
                            <th>游戏类型</th>
                            <th>难度</th>
                            <th>开始时间</th>
                            <th>状态</th>
                            <th>游戏时长</th>
                            <th>获得积分</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                    </tbody>
                </table>

                <!-- 空状态提示 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">📝</div>
                    <p>还没有游戏记录</p>
                    <button class="primary-btn" onclick="goHome()">开始游戏</button>
                </div>

                <!-- 分页控件 -->
                <div class="pagination-container" id="paginationContainer" style="display: none;">
                    <div class="pagination-info">共 <span id="totalRecords"></span> 条记录</div>
                    <div class="pagination-controls">
                        <button class="pagination-btn" id="prevPageBtn" onclick="changePage(currentPage - 1)" disabled
                            title="上一页">‹</button>
                        <span class="pagination-current" id="paginationCurrent">1 / 1</span>
                        <button class="pagination-btn" id="nextPageBtn" onclick="changePage(currentPage + 1)" disabled
                            title="下一页">›</button>
                    </div>
                </div>
            </div>


            <!-- 积分记录筛选 -->
            <div class="filter-section" id="scoreFilterSection" style="display: none;">
                <h3>按收支筛选</h3>
                <select class="filter-select" onchange="filterScoreRecords(this.value)">
                    <option value="ALL">全部</option>
                    <option value="INCOME">收入</option>
                    <option value="EXPENSE">支出</option>
                </select>
            </div>
            <!-- 积分记录列表 -->
            <div class="score-records-container" id="scoreRecordsContainer" style="display: none;">


                <div class="score-records-list" id="scoreRecordsList"></div>

                <!-- 积分记录空状态提示 -->
                <div class="empty-state" id="scoreEmptyState" style="display: none;">
                    <div class="empty-icon">💰</div>
                    <p>还没有积分记录</p>
                    <button class="primary-btn" onclick="goHome()">开始游戏</button>
                </div>

                <!-- 积分记录分页控件 -->
                <div class="pagination-container" id="scorePaginationContainer" style="display: none;">
                    <div class="pagination-info">共 <span id="totalScoreRecords"></span> 条记录</div>
                    <div class="pagination-controls">
                        <button class="pagination-btn" id="scorePrevPageBtn"
                            onclick="changeScorePage(currentScorePage - 1)" disabled title="上一页">‹</button>
                        <span class="pagination-current" id="scorePaginationCurrent">1 / 1</span>
                        <button class="pagination-btn" id="scoreNextPageBtn"
                            onclick="changeScorePage(currentScorePage + 1)" disabled title="下一页">›</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="sudoku.js"></script>
    <script>
        // 分页变量
        let currentPage = 1;
        let currentScorePage = 1;
        const pageSize = 20;
        let currentFilter = 'ALL';
        let currentScoreFilter = 'ALL';
        let currentRecordType = 'game';
        let allGameRecords = [];
        let allScoreRecords = [];

        // 记录页初始化
        document.addEventListener("DOMContentLoaded", function () {
            loadRecords();
        });

        // 加载记录
        function loadRecords() {
            allGameRecords = Storage.getRecords();
            allScoreRecords = Storage.getScoreRecords();

            // 更新统计
            const totalGames = allGameRecords.length;
            const completedGames = allGameRecords.filter(r => r.isCompleted && !r.isAbandoned).length;
            const totalTime = allGameRecords.reduce((sum, r) => sum + (r.completionTime || 0), 0);

            document.getElementById('totalGames').textContent = totalGames;
            document.getElementById('completedGames').textContent = completedGames;
            document.getElementById('totalTime').textContent = formatTime(totalTime);

            // 根据当前记录类型显示内容
            if (currentRecordType === 'game') {
                loadGameRecords();
            } else {
                loadScoreRecords();
            }
        }

        // 切换记录类型
        function switchRecordType(type) {
            currentRecordType = type;
            currentPage = 1;
            currentScorePage = 1;

            // 更新标签样式
            document.querySelectorAll('.record-tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(type + 'RecordTab').classList.add('active');

            // 显示/隐藏对应的容器
            if (type === 'game') {
                document.getElementById('gameFilterSection').style.display = 'block';
                document.getElementById('gameRecordsContainer').style.display = 'block';
                document.getElementById('scoreRecordsContainer').style.display = 'none';
                document.getElementById('scoreFilterSection').style.display = 'none';
                loadGameRecords();
            } else {
                document.getElementById('gameFilterSection').style.display = 'none';
                document.getElementById('gameRecordsContainer').style.display = 'none';
                document.getElementById('scoreRecordsContainer').style.display = 'block';
                document.getElementById('scoreFilterSection').style.display = 'block';
                loadScoreRecords();
            }
        }

        // 加载游戏记录（带分页）
        function loadGameRecords() {
            // 筛选记录
            const filteredRecords = currentFilter === 'ALL'
                ? allGameRecords
                : allGameRecords.filter(r => r.gameType === currentFilter);

            // 更新总记录数
            document.getElementById('totalRecords').textContent = filteredRecords.length;

            if (filteredRecords.length === 0) {
                document.getElementById('recordsBody').innerHTML = '';
                document.getElementById('recordsTable').style.display = 'none';
                document.getElementById('paginationContainer').style.display = 'none';
                document.getElementById('emptyState').style.display = 'flex';
                return;
            }

            document.getElementById('recordsTable').style.display = 'table';
            document.getElementById('emptyState').style.display = 'none';

            // 按ID倒序排列
            filteredRecords.sort((a, b) => b.puzzleId - a.puzzleId);

            // 计算分页
            const totalPages = Math.ceil(filteredRecords.length / pageSize);
            const startIndex = (currentPage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = filteredRecords.slice(startIndex, endIndex);

            // 更新分页控件状态
            document.getElementById('paginationContainer').style.display = 'flex';
            document.getElementById('paginationCurrent').textContent = `${currentPage} / ${totalPages}`;
            document.getElementById('prevPageBtn').disabled = currentPage <= 1;
            document.getElementById('nextPageBtn').disabled = currentPage >= totalPages;

            const latestInProgress = filteredRecords.find(r => !r.isCompleted && !r.isAbandoned);

            document.getElementById('recordsBody').innerHTML = pageRecords.map(record => {
                const isLatestInProgress = latestInProgress && record.puzzleId === latestInProgress.puzzleId;
                const canContinue = isLatestInProgress;
                const canView = record.isCompleted && record.solution;
                const statusText = record.isAbandoned ? '已放弃' : (record.isCompleted ? '已完成' : '进行中');
                const statusClass = record.isAbandoned ? 'abandoned' : (record.isCompleted ? 'completed' : 'in-progress');

                const startTimeText = record.startTime ? formatDateTime(record.startTime) : '--';
                const duration = record.isCompleted ? (record.completionTime || 0) : (record.elapsedTime || 0);
                const durationText = formatTime(duration);

                const scoreText = record.isCompleted && record.totalScore !== undefined
                    ? `+${record.totalScore}`
                    : '-';
                const scoreClass = record.isCompleted && record.totalScore > 0 ? 'positive' : '';
                const gameType = record.gameType || 'STANDARD';
                const difficultyType = record.difficultyType || 'MEDIUM';

                return `
                    <tr>
                        <td>#${record.puzzleId}</td>
                        <td><span class="gameType-badge ${gameType.toLowerCase()}">${getGameTypeName(gameType)}</span></td>
                        <td>${getDifficultyTypeName(difficultyType)}</td>
                        <td>${startTimeText}</td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>${durationText}</td>
                        <td><span class="score-badge ${scoreClass}">${scoreText}</span></td>
                        <td>${canContinue ? '<button class="action-btn" onclick="continuePuzzle(' + record.puzzleId + ', \'' + gameType + '\')">继续</button>' : (canView ? '<button class="action-btn view-btn" onclick="viewPuzzle(' + record.puzzleId + ')">查看题目</button>' : '-')}</td>
                    </tr>
                `;
            }).join('');
        }

        // 加载积分记录（带分页）
        function loadScoreRecords() {
            // 根据筛选条件过滤记录
            let filteredRecords = [...allScoreRecords];
            if (currentScoreFilter === 'INCOME') {
                filteredRecords = filteredRecords.filter(r => r.score > 0);
            } else if (currentScoreFilter === 'EXPENSE') {
                filteredRecords = filteredRecords.filter(r => r.score < 0);
            }

            document.getElementById('totalScoreRecords').textContent = filteredRecords.length;

            if (filteredRecords.length === 0) {
                document.getElementById('scoreRecordsList').innerHTML = '';
                document.getElementById('scoreEmptyState').style.display = 'flex';
                document.getElementById('scorePaginationContainer').style.display = 'none';
                return;
            }

            document.getElementById('scoreEmptyState').style.display = 'none';

            // 按时间倒序排列
            const sortedRecords = filteredRecords.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            // 计算分页
            const totalPages = Math.ceil(sortedRecords.length / pageSize);
            const startIndex = (currentScorePage - 1) * pageSize;
            const endIndex = startIndex + pageSize;
            const pageRecords = sortedRecords.slice(startIndex, endIndex);

            // 更新分页控件状态
            document.getElementById('scorePaginationContainer').style.display = 'flex';
            document.getElementById('scorePaginationCurrent').textContent = `${currentScorePage} / ${totalPages}`;
            document.getElementById('scorePrevPageBtn').disabled = currentScorePage <= 1;
            document.getElementById('scoreNextPageBtn').disabled = currentScorePage >= totalPages;

            document.getElementById('scoreRecordsList').innerHTML = pageRecords.map(record => {
                const typeIcon = record.type === 'achievement' ? '' : (record.type === 'task' ? '📋' : (record.type === 'purchase' ? '🛒' : '🎮'));
                const typeBg = record.type === 'achievement' ? 'achievement' : (record.type === 'task' ? 'task' : (record.type === 'purchase' ? 'purchase' : 'game'));
                const recordTime = formatDateTime(record.timestamp);
                const scoreText = record.score >= 0 ? `+${record.score}` : `${record.score}`;

                return `
                    <div class="score-record-item ${typeBg}">
                        <div class="score-record-left">
                            <div class="score-record-icon">${typeIcon}</div>
                            <div class="score-record-info">
                                <div class="score-record-name">${record.name}</div>
                                <div class="score-record-desc">${record.description}</div>
                            </div>
                        </div>
                        <div class="score-record-right">
                            <span class="score-record-score ${record.score < 0 ? 'expense' : 'income'}">${scoreText}</span>
                            <div class="score-record-time">${recordTime}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 筛选积分记录
        function filterScoreRecords(filterType) {
            currentScoreFilter = filterType;
            currentScorePage = 1;
            loadScoreRecords();
        }

        // 切换页码（游戏记录）
        function changePage(page) {
            const filteredRecords = currentFilter === 'ALL'
                ? allGameRecords
                : allGameRecords.filter(r => r.gameType === currentFilter);
            const totalPages = Math.ceil(filteredRecords.length / pageSize);

            if (page < 1 || page > totalPages) return;

            currentPage = page;
            loadGameRecords();
        }

        // 切换页码（积分记录）
        function changeScorePage(page) {
            const totalPages = Math.ceil(allScoreRecords.length / pageSize);

            if (page < 1 || page > totalPages) return;

            currentScorePage = page;
            loadScoreRecords();
        }

        // 筛选记录（覆盖原有函数）
        function filterRecords(filter) {
            currentFilter = filter;
            currentPage = 1;
            loadGameRecords();
        }
    </script>
</body>

</html>
