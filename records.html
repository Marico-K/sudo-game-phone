<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>我的记录</title>
    <link rel="stylesheet" href="sudoku.css">
</head>

<body>
    <!-- ==================== 记录页面容器 ==================== -->
    <!-- 查看题目弹窗 -->
    <div class="modal" id="viewPuzzleModal" style="display: none;">
        <div class="modal-content view-puzzle-content">
            <span class="close" onclick="closeModal('viewPuzzleModal')">&times;</span>
            <h2>📋 题目 #<span id="viewPuzzleId"></span></h2>
            <div class="view-puzzle-tabs">
                <button class="tab-btn active" onclick="switchViewPuzzleTab('puzzle')">题目</button>
                <button class="tab-btn" onclick="switchViewPuzzleTab('solution')">答案</button>
            </div>
            <div class="view-puzzle-board-container">
                <div id="viewPuzzleBoard" class="view-puzzle-board"></div>
            </div>
            <div class="view-puzzle-difficulty">
                难度: <span id="viewPuzzleDifficulty"></span>
            </div>
        </div>
    </div>

    <!-- ==================== 记录页面容器 ==================== -->
    <div class="container" id="recordsPage">
        <header class="game-header">
            <div class="header-left">
                <button class="back-btn" onclick="goHome()">← 返回</button>
                <h1>📊 我的记录</h1>
            </div>
        </header>

        <main class="records-main">
            <!-- 统计摘要 -->
            <div class="stats-summary">
                <div class="stat-card">
                    <div class="stat-number" id="totalGames">0</div>
                    <div class="stat-label">总游戏次数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="completedGames">0</div>
                    <div class="stat-label">已完成</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number" id="totalTime">00:00</div>
                    <div class="stat-label">总用时</div>
                </div>
            </div>

            <!-- 筛选下拉框 -->
            <div class="filter-section">
                <h3>按难度筛选</h3>
                <select class="filter-select" onchange="filterRecords(this.value)">
                    <option value="ALL">全部</option>
                    <option value="MINI_4x4">迷你4宫格</option>
                    <option value="MINI_6x6">迷你6宫格</option>
                    <option value="EASY">简单9宫格</option>
                    <option value="MEDIUM">中等9宫格</option>
                    <option value="HARD">高级9宫格</option>
                    <option value="DIAGONAL">对角线数独</option>
                    <option value="ODD_EVEN">奇偶数独</option>
                    <option value="KILLER_4x4">杀手4宫格</option>
                    <option value="KILLER_6x6">杀手6宫格</option>
                    <option value="KILLER_9x9">杀手9宫格</option>
                    <option value="IRREGULAR">锯齿数独</option>
                    <option value="WINDOKU">窗口数独</option>
                    <option value="SANDWICH">三明治数独</option>
                </select>
            </div>

            <!-- 记录表格 -->
            <div class="records-table-container">
                <table class="records-table" id="recordsTable">
                    <thead>
                        <tr>
                            <th>题目ID</th>
                            <th>难度</th>
                            <th>开始时间</th>
                            <th>状态</th>
                            <th>游戏时长</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="recordsBody">
                    </tbody>
                </table>

                <!-- 空状态提示 -->
                <div class="empty-state" id="emptyState" style="display: none;">
                    <div class="empty-icon">📝</div>
                    <p>还没有游戏记录</p>
                    <button class="primary-btn" onclick="goHome()">开始游戏</button>
                </div>
            </div>
        </main>
    </div>

    <script src="sudoku.js"></script>
    <script>
        // 记录页初始化
        document.addEventListener("DOMContentLoaded", function () {
            loadRecords();
        });
    </script>
</body>

</html>
