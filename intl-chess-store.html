<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>积分商城 - 国际象棋</title>
<link rel="stylesheet" href="chess-game.css">
<style>
body { background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #0d1b2a 100%); }
</style>
</head>
<body class="store-body">

<div class="store-container">
  <div class="store-header">
    <h1>🏪 积分商城</h1>
    <p>使用积分解锁国际象棋权限，享受对弈乐趣</p>
  </div>

  <div class="user-score-bar">
    <div>
      <div class="user-score-label">我的积分</div>
      <div class="user-score-value">🪙 <span id="user-score">0</span></div>
    </div>
    <div class="earn-hint">每日签到 / 完成对局可获得积分</div>
  </div>

  <div class="earn-section">
    <h2>🎯 赚取积分</h2>
    <div class="earn-grid">
      <div class="earn-item">
        <span class="earn-item-icon">📅</span>
        <div class="earn-item-title">每日签到</div>
        <div class="earn-item-reward">+50 积分</div>
        <button class="btn-earn" id="btn-checkin" onclick="doCheckin()">签到</button>
      </div>
      <div class="earn-item">
        <span class="earn-item-icon">♟️</span>
        <div class="earn-item-title">对局奖励</div>
        <div class="earn-item-reward">+20 积分/局</div>
        <button class="btn-earn available" onclick="doPlayReward()">领取</button>
      </div>
      <div class="earn-item">
        <span class="earn-item-icon">🏆</span>
        <div class="earn-item-title">首胜奖励</div>
        <div class="earn-item-reward">+100 积分</div>
        <button class="btn-earn" id="btn-firstwin" onclick="doFirstWin()">领取</button>
      </div>
      <div class="earn-item">
        <span class="earn-item-icon">🎰</span>
        <div class="earn-item-title">幸运签</div>
        <div class="earn-item-reward">随机 10~80 积分</div>
        <button class="btn-earn" id="btn-lucky" onclick="doLucky()">抽签</button>
      </div>
    </div>
  </div>

  <div class="products-grid" id="products-grid"></div>

  <div class="back-bar">
    <button class="btn btn-gray" onclick="location.href='intl-chess.html'">返回游戏大厅</button>
    <button class="btn btn-gray" onclick="location.href='index.html'">返回首页</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ====== 独立存储 key（与象棋商城完全隔离） ======
const STORE_KEY = 'intl_chess_store';
const SCORE_KEY = 'intl_chess_score';
const CHECKIN_KEY = 'intl_chess_checkin_date';
const LUCKY_KEY = 'intl_chess_lucky_date';
const DAILY_KEY = 'intl_chess_daily';
const FIRSTWIN_KEY = 'intl_chess_firstwin';
const FIRSTWIN_STORE_KEY = 'intl_chess_firstwin_store_claimed';

const PRODUCTS = [
  {
    id: 'intl_chess_right',
    icon: '👑',
    name: '标准对局权限',
    desc: '解锁人机对战，支持完整国际象棋规则，含悔棋功能',
    price: 0,
    featured: false,
    freeLabel: '免费'
  },
  {
    id: 'intl_chess_pro',
    icon: '🏆',
    name: '高级对战权限',
    desc: '解锁进阶 / 大师难度 AI，挑战国际象棋大师级对手',
    price: 200,
    featured: true,
  },
  {
    id: 'intl_chess_classic',
    icon: '🟫',
    name: '经典木纹棋盘',
    desc: '深色木质棋盘主题，传统国际象棋视觉效果',
    price: 150,
  },
  {
    id: 'intl_chess_marble',
    icon: '🟪',
    name: '大理石棋盘主题',
    desc: '优雅大理石纹理棋盘，高端对弈体验',
    price: 150,
  },
  {
    id: 'intl_chess_hint',
    icon: '💡',
    name: '走棋提示功能',
    desc: '开局策略建议与关键棋步智能提示',
    price: 100,
  },
  {
    id: 'intl_chess_opening',
    icon: '📖',
    name: '开局库手册',
    desc: '收录经典开局棋谱（意大利/西西里/后翼弃兵等）',
    price: 120,
  }
];

function getScore() { return parseInt(localStorage.getItem(SCORE_KEY) || '200'); }
function setScore(v) { localStorage.setItem(SCORE_KEY, v); }
function addScore(v) { setScore(getScore() + v); renderScore(); }

function getOwned() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY) || '["intl_chess_right"]'); }
  catch(e) { return ['intl_chess_right']; }
}

function setOwned(arr) { localStorage.setItem(STORE_KEY, JSON.stringify(arr)); }
function isOwned(id) { return getOwned().includes(id); }

function todayStr() { return new Date().toISOString().slice(0,10); }

function getDailyData(){
  try{
    const d = JSON.parse(localStorage.getItem(DAILY_KEY)||'{}');
    const today = new Date().toISOString().slice(0,10);
    if(d.date !== today){
      return {date: today, gamesPlayed: 0, rewardsClaimed: 0};
    }
    return d;
  }catch(e){
    return {date: new Date().toISOString().slice(0,10), gamesPlayed: 0, rewardsClaimed: 0};
  }
}

function saveDailyData(d){ localStorage.setItem(DAILY_KEY, JSON.stringify(d)); }

// ====== 渲染 ======
function renderScore() {
  document.getElementById('user-score').textContent = getScore().toLocaleString();
}

function renderProducts() {
  const grid = document.getElementById('products-grid');
  const score = getScore();
  grid.innerHTML = PRODUCTS.map(p => {
    const owned = isOwned(p.id);
    const free = p.price === 0;
    const canBuy = !owned && score >= p.price;

    let btnClass = owned ? 'owned' : (canBuy || free ? 'available' : 'unaffordable');
    let btnText = owned ? '✅ 已拥有' : (free ? '免费领取' : `购买 ${p.price} 🪙`);
    let btnDisabled = owned ? 'disabled' : '';

    return `
      <div class="product-card ${owned ? 'owned' : ''} ${p.featured ? 'featured' : ''}">
        ${p.featured ? '<div style="position:absolute;top:10px;right:10px;background:#ffd700;color:#3d1a00;font-size:0.7rem;padding:2px 8px;border-radius:10px;font-weight:bold;">推荐</div>' : ''}
        <span class="product-icon">${p.icon}</span>
        <div class="product-name">${p.name}</div>
        <div class="product-desc">${p.desc}</div>
        ${free ? '<div class="product-price" style="color:#00e080">免费</div>' : `<div class="product-price"><span class="coin-icon">🪙</span>${p.price.toLocaleString()} 积分</div>`}
        <button class="btn-purchase ${btnClass}" ${btnDisabled}
          onclick="purchaseProduct('${p.id}', ${p.price}, ${free})">
          ${btnText}
        </button>
      </div>
    `;
  }).join('');
}

// ====== 购买逻辑 ======
function purchaseProduct(id, price, free) {
  if (isOwned(id)) return;
  const score = getScore();

  if (!free && score < price) {
    showToast('积分不足，请先赚取更多积分！');
    return;
  }

  const product = PRODUCTS.find(p => p.id === id);
  if (!free) setScore(score - price);

  const owned = getOwned();
  owned.push(id);
  setOwned(owned);

  renderScore();
  renderProducts();
  showToast(`🎉 已成功获得「${product.name}」！`);
}

// ====== 赚积分 ======
function doCheckin() {
  const today = todayStr();
  const last = localStorage.getItem(CHECKIN_KEY);
  if (last === today) { showToast('今日已签到，明天再来！'); return; }
  localStorage.setItem(CHECKIN_KEY, today);
  addScore(50);
  renderProducts();
  showToast('📅 签到成功！获得 50 积分');
  updateEarnButtons();
}

function doPlayReward() {
  const dd = getDailyData();

  if (dd.rewardsClaimed >= 5) {
    showToast('今日对局奖励已领满（5次），明天再来！');
    return;
  }

  if (dd.gamesPlayed <= dd.rewardsClaimed) {
    showToast('请先完成对局才能领取奖励！已玩' + dd.gamesPlayed + '局，已领' + dd.rewardsClaimed + '次');
    return;
  }

  dd.rewardsClaimed++;
  saveDailyData(dd);
  addScore(20);
  renderProducts();
  showToast('♟️ 对局奖励 +20 积分（已完成' + dd.gamesPlayed + '局，已领' + dd.rewardsClaimed + '次）');
}

function doFirstWin() {
  if (localStorage.getItem(FIRSTWIN_KEY) !== '1') {
    showToast('需要在人机对战中获胜后才能领取！');
    return;
  }
  if (localStorage.getItem(FIRSTWIN_STORE_KEY) === '1') {
    showToast('首胜奖励已在商城领取过了！');
    return;
  }
  localStorage.setItem(FIRSTWIN_STORE_KEY, '1');
  addScore(100);
  renderProducts();
  showToast('🏆 首胜奖励 +100 积分！');
  updateEarnButtons();
}

function doLucky() {
  const today = todayStr();
  const last = localStorage.getItem(LUCKY_KEY);
  if (last === today) { showToast('今日幸运签已抽取，明天再来！'); return; }
  localStorage.setItem(LUCKY_KEY, today);
  const reward = Math.floor(Math.random() * 71) + 10;
  addScore(reward);
  renderProducts();
  showToast(`🎰 恭喜！幸运签获得 ${reward} 积分！`);
  updateEarnButtons();
}

function updateEarnButtons() {
  const today = todayStr();
  const dd = getDailyData();

  const checkinBtn = document.getElementById('btn-checkin');
  if (localStorage.getItem(CHECKIN_KEY) === today) {
    checkinBtn.className = 'btn-earn done';
    checkinBtn.textContent = '已签到';
    checkinBtn.disabled = true;
  }

  const luckyBtn = document.getElementById('btn-lucky');
  if (localStorage.getItem(LUCKY_KEY) === today) {
    luckyBtn.className = 'btn-earn done';
    luckyBtn.textContent = '已抽签';
    luckyBtn.disabled = true;
  }

  const playBtn = document.querySelector('.earn-item:nth-child(2) .btn-earn');
  if (playBtn) {
    if (dd.rewardsClaimed >= 5) {
      playBtn.className = 'btn-earn done';
      playBtn.textContent = '已满';
      playBtn.disabled = true;
    } else if (dd.gamesPlayed <= dd.rewardsClaimed) {
      playBtn.className = 'btn-earn';
      playBtn.textContent = '领取';
      playBtn.disabled = false;
    } else {
      playBtn.className = 'btn-earn available';
      playBtn.textContent = '领取';
      playBtn.disabled = false;
    }
  }

  const firstwinBtn = document.getElementById('btn-firstwin');
  const hasWon = localStorage.getItem(FIRSTWIN_KEY) === '1';
  const storeClaimed = localStorage.getItem(FIRSTWIN_STORE_KEY) === '1';
  if (storeClaimed) {
    firstwinBtn.className = 'btn-earn done';
    firstwinBtn.textContent = '已领取';
    firstwinBtn.disabled = true;
  } else if (!hasWon) {
    firstwinBtn.className = 'btn-earn';
    firstwinBtn.textContent = '需获胜';
    firstwinBtn.disabled = false;
  } else {
    firstwinBtn.className = 'btn-earn available';
    firstwinBtn.textContent = '领取';
    firstwinBtn.disabled = false;
  }
}

// ====== Toast ======
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
}

// ====== 初始化 ======
renderScore();
renderProducts();
updateEarnButtons();

const owned = getOwned();
if (!owned.includes('intl_chess_right')) {
  owned.push('intl_chess_right');
  setOwned(owned);
  renderProducts();
}
</script>
</body>
</html>
