<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>数独 - 首页</title>
    <link rel="stylesheet" href="sudoku.css">
</head>

<body>
    <!-- 只留原来的首页：难度选择、继续游戏、我的记录按钮 -->
    <div class="container" id="homePage">
        <header>
            <h1>数独游戏</h1>
            <p>单机版本 - 无竞技功能</p>
            <!-- 玩家等级信息 -->
            <div class="player-level-info" id="playerLevelInfo">
                <div class="level-badge">
                    <span class="level-icon" id="levelIcon"></span>
                    <span class="level-number" id="levelNumber">L1</span>
                    <span class="level-name" id="levelName">初学萌新</span>
                </div>
                <div class="level-progress">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-text" id="progressText">0 / 15 分</span>
                </div>
                <div class="player-stats">
                    <span class="stat-item">
                        <span class="stat-icon">🔥</span>
                        <span class="stat-value" id="continueDay">0</span>天
                    </span>
                    <span class="stat-item achievement-btn" id="achievementBtn" onclick="showAchievementModal()">
                        <span class="stat-icon">🏆</span>
                        <span class="stat-value" id="achievementCount">0</span>成就
                    </span>
                </div>
            </div>
        </header>

        <main class="gameType-selection">
            <!-- 继续上一局按钮（有未完成游戏时显示） -->
            <div id="continueGameSection" style="display: none;">
                <h2>继续上一局游戏</h2>
                <div class="home-buttons-area">
                    <button class="home-btn primary" onclick="continueLatestGame()">▶️ 继续游戏</button>
                    <p>或</p>
                    <button class="home-btn secondary" onclick="clearProgressAndShowGameType()">🎲 开始新游戏</button>
                
                    <button class="home-btn secondary" onclick="showRecords()">📊 我的记录</button>
                    <button class="home-btn secondary" onclick="window.location.href='advanced-techniques.html'">📚 进阶技巧</button>
                </div>
            </div>

            <!-- 默认显示区域：开始挑战按钮 + 每日任务 + 我的记录 + 进阶技巧 -->
            <div id="defaultSection">
                <!-- 每日任务区域（可收缩） -->
                <div class="daily-tasks-section">
                    <div class="section-header" onclick="toggleDailyTasks()">
                        <h3>📋 每日任务</h3>
                        <div class="header-right">
                            <span class="refresh-badge" id="dailyRefreshBadge">今日已刷新</span>
                            <span class="expand-icon" id="dailyExpandIcon">▼</span>
                        </div>
                    </div>
                    <div id="dailyTasksContent">
                        <div id="dailyTasksList">
                            <!-- 每日任务列表将动态生成 -->
                        </div>
                        <div class="daily-total-reward">
                            <span>今日任务奖励总计:</span>
                            <span class="reward-total" id="dailyRewardTotal">0</span>分
                        </div>
                    </div>
                </div>

                <div class="home-buttons-area">
                    <button class="home-btn primary" onclick="showGameTypeModal()">🎮 开始挑战</button>
                    <button class="home-btn secondary" onclick="showRecords()">📊 我的记录</button>
                    <button class="home-btn secondary" onclick="window.location.href='advanced-techniques.html'">📚 进阶技巧</button>
                </div>
            </div>
        </main>

        <footer>
            <p>💡 数据存储在本地浏览器中，清除浏览器数据会丢失记录</p>
        </footer>
    </div>

    <!-- 只引入JS，不要执行游戏逻辑 -->
    <script src="sudoku.js"></script>
    <script>
        // 加载玩家等级信息
        function loadPlayerLevelInfo() {
            const playerData = Storage.getPlayerData();
            const levelInfo = getLevelInfo(playerData.totalScore);
            const scoreToNext = getScoreToNextLevel(playerData.level);
            
            // 更新等级信息
            document.getElementById('levelNumber').textContent = `L${playerData.level}`;
            const levelNameElement = document.getElementById('levelName');
            levelNameElement.textContent = levelInfo.name;
            
            // 根据段位设置对应的样式class
            const titleClassMap = {
                '萌新': 'novice',
                '爱好者': 'lover',
                '高手': 'master',
                '大师': 'grandmaster',
                '宗师': 'legend'
            };
            const titleClass = titleClassMap[levelInfo.title] || 'novice';
            levelNameElement.className = 'level-name ' + titleClass;
            
            // 根据等级计算图标显示（3个⭐=1个🌙，3个🌙=1个☀️，3个☀️=1个👑）
            const level = playerData.level;
            let crowns = 0, suns = 0, moons = 0, stars = 0;
            
            if (level >= 15) {
                crowns = 1; // L15显示皇冠
            } else {
                const totalStars = level;
                
                // 计算皇冠数
                crowns = Math.floor(totalStars / 27);
                let remaining = totalStars % 27;
                
                // 计算太阳数
                suns = Math.floor(remaining / 9);
                remaining = remaining % 9;
                
                // 计算月亮数
                moons = Math.floor(remaining / 3);
                stars = remaining % 3;
            }
            
            // 生成图标显示
            let iconText = '';
            if (crowns > 0) iconText += '👑'.repeat(crowns);
            if (suns > 0) iconText += '☀️'.repeat(suns);
            if (moons > 0) iconText += '🌙'.repeat(moons);
            if (stars > 0) iconText += '⭐'.repeat(stars);
            
            const levelIconElement = document.getElementById('levelIcon');
            levelIconElement.textContent = iconText;
            
            // 更新进度条
            if (scoreToNext !== null) {
                const currentLevelInfo = levelConfig.find(l => l.level === playerData.level);
                const progress = ((playerData.totalScore - currentLevelInfo.minScore) / scoreToNext) * 100;
                document.getElementById('progressFill').style.width = `${Math.min(progress, 100)}%`;
                document.getElementById('progressText').textContent = `${playerData.totalScore - currentLevelInfo.minScore} / ${scoreToNext} 分`;
            } else {
                // 已达到最高等级
                document.getElementById('progressFill').style.width = '100%';
                document.getElementById('progressText').textContent = '已满级';
            }
            
            // 更新连续打卡天数
            document.getElementById('continueDay').textContent = playerData.continueDay;
            
            // 更新成就数量
            document.getElementById('achievementCount').textContent = playerData.achievementList.length;
            
            // 加载每日任务
            loadDailyTasks();
        }
        
        // 切换每日任务收缩/展开
        function toggleDailyTasks() {
            const content = document.getElementById('dailyTasksContent');
            const header = document.querySelector('.section-header');
            
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded');
                header.classList.remove('expanded');
            } else {
                content.classList.add('expanded');
                header.classList.add('expanded');
            }
        }
        
        // 加载每日任务
        function loadDailyTasks() {
            const tasks = Storage.getDailyTasks();
            const taskList = document.getElementById('dailyTasksList');
            const rewardTotal = document.getElementById('dailyRewardTotal');
            
            taskList.innerHTML = '';
            
            let totalReward = 0;
            let completedCount = 0;
            
            Object.keys(tasks).forEach(taskId => {
                if (taskId === 'lastRefreshDate') return;
                
                const task = tasks[taskId];
                const isCompleted = task.completed || task.claimed;
                const progress = task.progress || 0;
                const target = task.target || 1;
                
                if (isCompleted) {
                    completedCount++;
                }
                
                totalReward += task.reward;
                
                const taskItem = document.createElement('div');
                taskItem.className = `daily-task-item ${isCompleted ? 'completed' : ''}`;
                taskItem.innerHTML = `
                    <div class="task-status">${isCompleted ? '✓' : ''}</div>
                    <div class="task-info">
                        <div class="task-name">${task.name}</div>
                        <div class="task-desc">${task.description}</div>
                    </div>
                    <div class="task-meta">
                        <div class="task-progress">
                            <div class="progress-bar-small">
                                <div class="progress-fill-small" style="width: ${Math.min((progress / target) * 100, 100)}%"></div>
                            </div>
                            <span class="progress-text-small">${progress}/${target}</span>
                        </div>
                        <div class="task-reward">+${task.reward}分</div>
                    </div>
                `;
                
                taskList.appendChild(taskItem);
            });
            
            rewardTotal.textContent = totalReward;
            
            // 更新刷新徽章
            const badge = document.getElementById('dailyRefreshBadge');
            badge.textContent = `${completedCount}/5 已完成`;
        }
        
        // 显示继续游戏区域
        function showContinueGameSection() {
            document.getElementById('continueGameSection').style.display = 'block';
            document.getElementById('defaultSection').style.display = 'none';
        }
        
        // 显示默认区域（开始挑战按钮）
        function showDefaultSection() {
            document.getElementById('continueGameSection').style.display = 'none';
            document.getElementById('defaultSection').style.display = 'block';
        }
        
        // 显示游戏类型选择弹窗
        function showGameTypeModal() {
            document.getElementById('GameTypeModal').style.display = 'flex';
        }
        
        // 关闭游戏类型选择弹窗
        function closeGameTypeModal() {
            document.getElementById('GameTypeModal').style.display = 'none';
        }
        
        // 清除进度并显示游戏类型选择弹窗
        function clearProgressAndShowGameType() {
            // 不立即标记记录为放弃，只是显示弹窗
            // 只有当用户真正开始新游戏时，才在 sudoku.js 的 startGame 函数中标记为放弃
            showGameTypeModal();
        }
        
        // 显示成就弹窗
        function showAchievementModal() {
            const playerData = Storage.getPlayerData();
            const achievementList = document.getElementById('achievementList');
            
            // 清空列表
            achievementList.innerHTML = '';
            
            // 从 sudoku.js 获取所有成就配置
            const allAchievements = window.achievementConfig || [
                { id: 'ACH001', name: '新手启程', reward: 5, condition: '通关10道入门题' },
                { id: 'ACH002', name: '持之以恒', reward: 15, condition: '连续7天每日≥1通关' },
                { id: 'ACH003', name: '速通达人', reward: 10, condition: '普通9宫3分钟内通关' },
                { id: 'ACH004', name: '变体先锋', reward: 20, condition: '首次通关变体数独' },
                { id: 'ACH005', name: '小有成就', reward: 15, condition: '累计通关50道题' },
                { id: 'ACH006', name: '百题斩', reward: 30, condition: '累计通关100道题' },
                { id: 'ACH007', name: '千题大师', reward: 100, condition: '累计通关1000道题' },
                { id: 'ACH008', name: '初遇挑战', reward: 10, condition: '首次通关中等难度' },
                { id: 'ACH009', name: '迎难而上', reward: 25, condition: '首次通关高级难度' },
                { id: 'ACH010', name: '速度之星', reward: 20, condition: '普通9宫1分钟内通关' },
                { id: 'ACH011', name: '完美主义', reward: 15, condition: '首次无错误通关' },
                { id: 'ACH012', name: '连胜王者', reward: 20, condition: '连续通关5次' },
                { id: 'ACH013', name: '变体大师', reward: 50, condition: '通关所有类型变体数独' },
                { id: 'ACH014', name: '杀手专家', reward: 30, condition: '通关所有难度杀手数独' },
                { id: 'ACH015', name: '挑战极限', reward: 50, condition: '通关所有类型数独' },
                { id: 'ACH016', name: '打卡达人', reward: 30, condition: '连续14天打卡' },
                { id: 'ACH017', name: '签到王者', reward: 50, condition: '连续30天打卡' },
                { id: 'ACH018', name: '初见杀手', reward: 15, condition: '首次通关杀手数独' },
                { id: 'ACH019', name: '对角线达人', reward: 15, condition: '首次通关对角线数独' },
                { id: 'ACH020', name: '迷你专家', reward: 10, condition: '通关所有迷你数独' }
            ];
            
            // 生成成就列表
            allAchievements.forEach(achievement => {
                const isUnlocked = playerData.achievementList.includes(achievement.id);
                const achievementItem = document.createElement('div');
                achievementItem.className = `achievement-item ${isUnlocked ? 'unlocked' : 'locked'}`;
                
                achievementItem.innerHTML = `
                    <div class="achievement-icon">${isUnlocked ? '🏆' : '🔒'}</div>
                    <div class="achievement-info">
                        <div class="achievement-name">${achievement.name}</div>
                        <div class="achievement-condition">${achievement.condition}</div>
                        <div class="achievement-reward">奖励: +${achievement.reward}分</div>
                    </div>
                `;
                
                achievementList.appendChild(achievementItem);
            });
            
            // 显示弹窗
            document.getElementById('AchievementModal').style.display = 'flex';
        }
        
        // 关闭成就弹窗
        function closeAchievementModal() {
            document.getElementById('AchievementModal').style.display = 'none';
        }
        
        // 首页一进来就执行
        document.addEventListener("DOMContentLoaded", function () {
            loadPlayerLevelInfo();
            if (hasInProgressGame()) {
                showContinueGameSection();
            } else {
                showDefaultSection();
            }
        });
    </script>

    <!-- 成就弹窗 -->
    <div id="AchievementModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>🏆 我的成就</h2>
                <span class="close" onclick="closeAchievementModal()">&times;</span>
            </div>
            <div class="modal-body">
                <div id="achievementList">
                    <!-- 成就列表将动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 游戏类型选择弹窗 -->
    <div id="GameTypeModal" class="modal">
        <div class="modal-content gameType-modal-content">
            <div class="modal-header">
                <h2>选择玩法开始游戏</h2>
                <span class="close" onclick="closeGameTypeModal()">&times;</span>
            </div>
            <div class="gameType-modal-body">
                <div class="gameType-buttons">
                    <button class="gameType-btn" onclick="showDifficultyModal('MINI_4x4')">
                        <span class="gameType-icon">🔢</span>
                        <span class="gameType-text">
                            <span class="gameType-name">迷你4宫格</span>
                            <span class="gameType-desc">4个数字不重复</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('MINI_6x6')">
                        <span class="gameType-icon">☕</span>
                        <span class="gameType-text">
                            <span class="gameType-name">迷你6宫格</span>
                            <span class="gameType-desc">6个数字不重复</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('STANDARD')">
                        <span class="gameType-icon">🎯</span>
                        <span class="gameType-text">
                            <span class="gameType-name">标准9宫格</span>
                            <span class="gameType-desc">9个数字不重复</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('DIAGONAL')">
                        <span class="gameType-icon">✖️</span>
                        <span class="gameType-text">
                            <span class="gameType-name">对角线数独</span>
                            <span class="gameType-desc">两条对角线不重复</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('ODD_EVEN')">
                        <span class="gameType-icon">☯️</span>
                        <span class="gameType-text">
                            <span class="gameType-name">奇偶数独</span>
                            <span class="gameType-desc">按色块填奇偶</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('KILLER_4x4')">
                        <span class="gameType-icon">🗡</span>
                        <span class="gameType-text">
                            <span class="gameType-name">杀手4宫格</span>
                            <span class="gameType-desc">虚线框内数字之和</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('KILLER_6x6')">
                        <span class="gameType-icon">⚔</span>
                        <span class="gameType-text">
                            <span class="gameType-name">杀手6宫格</span>
                            <span class="gameType-desc">虚线框内数字之和</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('KILLER_9x9')">
                        <span class="gameType-icon">💀</span>
                        <span class="gameType-text">
                            <span class="gameType-name">杀手9宫格</span>
                            <span class="gameType-desc">虚线框内数字之和</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('IRREGULAR')">
                        <span class="gameType-icon">〽️</span>
                        <span class="gameType-text">
                            <span class="gameType-name">锯齿数独</span>
                            <span class="gameType-desc">不规则宫格划分</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('WINDOKU')">
                        <span class="gameType-icon">🏠</span>
                        <span class="gameType-text">
                            <span class="gameType-name">窗口数独</span>
                            <span class="gameType-desc">四个3x3窗口</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('CENTER_DOT')">
                        <span class="gameType-icon">🎯</span>
                        <span class="gameType-text">
                            <span class="gameType-name">中心点数独</span>
                            <span class="gameType-desc">九个中心格不重复</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('STAR')">
                        <span class="gameType-icon">❄️</span>
                        <span class="gameType-text">
                            <span class="gameType-name">星号数独</span>
                            <span class="gameType-desc">星形图案不重复</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('BLACK_WHITE_DOT')">
                        <span class="gameType-icon">⚫⚪</span>
                        <span class="gameType-text">
                            <span class="gameType-name">黑白点数独</span>
                            <span class="gameType-desc">相邻数关系标记</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('SANDWICH')">
                        <span class="gameType-icon">🥪</span>
                        <span class="gameType-text">
                            <span class="gameType-name">三明治数独</span>
                            <span class="gameType-desc">1和9之间数字之和</span>
                        </span>
                    </button>
                    <button class="gameType-btn" onclick="showDifficultyModal('SKYSCRAPER')">
                        <span class="gameType-icon">🏙️</span>
                        <span class="gameType-text">
                            <span class="gameType-name">摩天楼数独</span>
                            <span class="gameType-desc">从外部看到的建筑数</span>
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 难度选择弹窗 -->
    <div id="DifficultyModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>选择难度</h2>
                <span class="close" onclick="closeDifficultyModal()">&times;</span>
            </div>
            <div class="help-content">
                <div style="display: grid; gap: 15px;">
                    <button class="control-btn" onclick="closeDifficultyModal(); startGame(currentGameType, 'EASY')"
                        style="background: linear-gradient(135deg, #4CAF50, #45a049);">
                        😊 简单
                    </button>
                    <button class="control-btn" onclick="closeDifficultyModal(); startGame(currentGameType, 'MEDIUM')"
                        style="background: linear-gradient(135deg, #FF9800, #F57C00);">
                        🤔 中等
                    </button>
                    <button class="control-btn" onclick="closeDifficultyModal(); startGame(currentGameType, 'HARD')"
                        style="background: linear-gradient(135deg, #F44336, #D32F2F);">
                        😰 高级
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
